const SI=document.getElementById('songSearch');
const RL=document.getElementById('resultsList');
const SD=document.getElementById('selectedSong');
const HV=document.getElementById('song');

function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').trim();}

SI.addEventListener('input',function(){
  var q=SI.value.trim();
  if(q.length<2){RL.style.display='none';return;}
  var nq=norm(q);
  var words=nq.split(' ').filter(function(w){return w.length>0;});
  var hits=SONGS.filter(function(s){
    var hay=norm(s.a+' '+s.t);
    return words.every(function(w){return hay.indexOf(w)>=0;});
  }).slice(0,8);
  RL.innerHTML='';
  hits.forEach(function(s){
    var d=document.createElement('div');
    d.className='result-item';
    d.innerHTML='<div class="ri">&#127925;</div><div class="rt"><div class="rn">'+esc(s.t)+'</div><div class="ra">'+esc(s.a)+'</div></div>';
    var lbl=s.a+' – '+s.t;
    d.addEventListener('touchstart',function(e){e.preventDefault();pick(lbl,s.a,s.t);});
    d.addEventListener('mousedown',function(){pick(lbl,s.a,s.t);});
    RL.appendChild(d);
  });
  var m=document.createElement('div');
  m.className='result-item';
  m.style.opacity='0.65';
  m.innerHTML='<div class="ri">&#9999;&#65039;</div><div class="rt"><div class="rn" style="font-style:italic;font-weight:400">Staat er niet bij?</div><div class="ra">Verstuur "'+esc(q)+'" direct</div></div>';
  m.addEventListener('touchstart',function(e){e.preventDefault();pick(q,'',q);});
  m.addEventListener('mousedown',function(){pick(q,'',q);});
  RL.appendChild(m);
  RL.style.display='block';
});

SI.addEventListener('blur',function(){setTimeout(function(){RL.style.display='none';},200);});

function pick(lbl,artist,title){
  HV.value=lbl;
  SI.style.display='none';
  RL.style.display='none';
  SD.innerHTML='<div class="selected-song"><div class="si">&#127925;</div><div class="sinfo"><div class="st">'+esc(title||lbl)+'</div>'+(artist?'<div class="sa">'+esc(artist)+'</div>':'')+'</div><button class="sc" id="clr" type="button">&#x2715;</button></div>';
  SD.style.display='block';
  document.getElementById('clr').addEventListener('click',reset);
}

function reset(){
  HV.value='';SI.value='';SI.style.display='block';
  SD.style.display='none';SD.innerHTML='';RL.style.display='none';SI.focus();
}

async function saveReq(req){
  try{
    var g=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
    var gd=await g.json();
    var ex=Array.isArray(gd.record)?gd.record:[];
    ex.unshift(req);
    var p=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(ex.slice(0,100))});
    return p.ok;
  }catch(e){return false;}
}

document.getElementById('requestForm').addEventListener('submit',async function(e){
  e.preventDefault();
  var song=HV.value.trim();
  if(!song){SI.focus();SI.style.borderColor='rgba(224,96,96,0.6)';return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Versturen...';
  var ok=await saveReq({id:Date.now(),song:song,name:document.getElementById('name').value.trim()||'Anoniem',message:document.getElementById('message').value.trim(),time:new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}),status:'nieuw'});
  if(ok){document.getElementById('requestForm').style.display='none';document.getElementById('successScreen').style.display='flex';}
  else{document.getElementById('errorMsg').style.display='block';btn.disabled=false;btn.textContent='Verstuur verzoek';}
});

document.getElementById('anotherBtn').addEventListener('click',function(){
  reset();
  document.getElementById('name').value='';
  document.getElementById('message').value='';
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('successScreen').style.display='none';
  document.getElementById('requestForm').style.display='flex';
  var btn=document.getElementById('submitBtn');
  btn.disabled=false;btn.textContent='Verstuur verzoek';
});

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
