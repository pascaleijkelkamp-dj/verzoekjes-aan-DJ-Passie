<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verzoekje aan DJ Passie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #242424;
    --accent: #f0c040; --accent-dim: rgba(240,192,64,0.12);
    --text: #f0ece4; --muted: #888; --border: rgba(255,255,255,0.08); --radius: 14px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 80px; }
  header { width: 100%; padding: 48px 24px 32px; text-align: center; }
  .badge { display: inline-block; background: var(--accent-dim); color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 99px; margin-bottom: 20px; border: 1px solid rgba(240,192,64,0.25); }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px; }
  h1 span { color: var(--accent); }
  .sub { font-size: 15px; color: var(--muted); line-height: 1.5; }
  form { width: 100%; max-width: 420px; padding: 0 20px; display: flex; flex-direction: column; gap: 14px; }
  label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  input, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 16px; padding: 14px 16px; font-family: inherit; transition: border-color 0.15s; outline: none; -webkit-appearance: none; }
  input:focus, textarea:focus { border-color: rgba(240,192,64,0.5); background: var(--surface2); }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  textarea { resize: none; min-height: 80px; line-height: 1.5; }
  .submit-btn { margin-top: 6px; width: 100%; background: var(--accent); color: #0d0d0d; font-size: 16px; font-weight: 700; padding: 16px; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s, transform 0.1s; font-family: inherit; }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: default; }
  .success-screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 60px 24px 0; gap: 16px; }
  .check-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 30px; }
  .success-screen h2 { font-size: 24px; font-weight: 700; }
  .success-screen p { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; }
  .another-btn { margin-top: 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 15px; font-weight: 600; padding: 13px 28px; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .dj-link { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 600; text-decoration: none; padding: 8px 14px; border-radius: 99px; letter-spacing: 0.05em; z-index: 10; }
  .error-msg { font-size: 13px; color: #e06060; display: none; margin-top: -6px; }

  /* Zoek resultaten */
  .search-wrap { position: relative; width: 100%; }
  .results-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface2); border: 1px solid rgba(240,192,64,0.3); border-radius: 12px; overflow: hidden; z-index: 50; max-height: 280px; overflow-y: auto; }
  .result-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--border); }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover, .result-item.focused { background: rgba(240,192,64,0.08); }
  .result-item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface); }
  .result-text { flex: 1; min-width: 0; }
  .result-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-artist { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-check { color: var(--accent); font-size: 16px; flex-shrink: 0; }
  .selected-song { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid rgba(240,192,64,0.4); border-radius: 12px; padding: 10px 14px; margin-top: 4px; }
  .selected-song img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }
  .selected-info { flex: 1; min-width: 0; }
  .selected-title { font-size: 14px; font-weight: 700; }
  .selected-artist { font-size: 12px; color: var(--muted); }
  .selected-clear { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .searching-msg { padding: 14px; text-align: center; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="badge">🎵 Verzoekjes</div>
  <h1>Vraag een nummer<br>aan voor <span>DJ Passie</span></h1>
  <p class="sub">Zoek een nummer en stuur<br>je verzoek direct naar de mixer.</p>
</header>

<form id="requestForm">
  <div>
    <label>Zoek artiest of nummer *</label>
    <div class="search-wrap">
      <input type="text" id="songSearch" placeholder="bijv. Dua Lipa of Levitating" autocomplete="off">
      <div class="results-list" id="resultsList" style="display:none"></div>
    </div>
    <div id="selectedSong" style="display:none"></div>
    <input type="hidden" id="song" required>
  </div>
  <div>
    <label>Jouw naam (optioneel)</label>
    <input type="text" id="name" placeholder="bijv. Sanne &amp; Joost" autocomplete="off">
  </div>
  <div>
    <label>Berichtje (optioneel)</label>
    <textarea id="message" placeholder="Voor de jarige! 🎂"></textarea>
  </div>
  <p class="error-msg" id="errorMsg">Er ging iets mis. Probeer het opnieuw.</p>
  <button type="submit" class="submit-btn" id="submitBtn">Verstuur verzoek 🎶</button>
</form>

<div class="success-screen" id="successScreen">
  <div class="check-circle">✓</div>
  <h2>Verzoek verstuurd!</h2>
  <p>DJ Passie heeft jouw nummer ontvangen. Houd de dansvloer in de gaten!</p>
  <button class="another-btn" id="anotherBtn">Nog een verzoek</button>
</div>

<a href="dj-dashboard.html" class="dj-link">🎧 DJ</a>

<script>
const BIN_ID = '6a3fc556da38895dfe07495f';
const API_KEY = '$2a$10$HSvUEG7Tte2c3RiQCZi1XOctWbQheMAIwQqt.EewSIyP6xB5zmGJi';

let searchTimer = null;
let selectedTrack = null;

const searchInput = document.getElementById('songSearch');
const resultsList = document.getElementById('resultsList');
const selectedDiv = document.getElementById('selectedSong');
const hiddenSong = document.getElementById('song');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { resultsList.style.display = 'none'; return; }
  searchTimer = setTimeout(() => searchTracks(q), 400);
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => { resultsList.style.display = 'none'; }, 180);
});

async function searchTracks(q) {
  resultsList.innerHTML = '<div class="searching-msg">Zoeken…</div>';
  resultsList.style.display = 'block';
  try {
    const url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(q) + '&media=music&limit=8&country=NL';
    const res = await fetch(url);
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      resultsList.innerHTML = '<div class="searching-msg">Geen resultaten gevonden</div>';
      return;
    }
    resultsList.innerHTML = '';
    data.results.forEach(track => {
      const item = document.createElement('div');
      item.className = 'result-item';
      const artwork = track.artworkUrl100 || track.artworkUrl60 || '';
      item.innerHTML =
        '<img src="' + artwork + '" alt="" onerror="this.style.display=\'none\'">' +
        '<div class="result-text">' +
          '<div class="result-title">' + escHtml(track.trackName) + '</div>' +
          '<div class="result-artist">' + escHtml(track.artistName) + '</div>' +
        '</div>' +
        '<span class="result-check">›</span>';
      item.addEventListener('mousedown', () => selectTrack(track));
      resultsList.appendChild(item);
    });
  } catch(e) {
    resultsList.innerHTML = '<div class="searching-msg">Zoeken mislukt — typ de naam handmatig</div>';
  }
}

function selectTrack(track) {
  selectedTrack = track;
  const label = track.artistName + ' – ' + track.trackName;
  hiddenSong.value = label;
  searchInput.style.display = 'none';
  resultsList.style.display = 'none';
  const artwork = track.artworkUrl100 || track.artworkUrl60 || '';
  selectedDiv.innerHTML =
    '<div class="selected-song">' +
      (artwork ? '<img src="' + artwork + '" alt="">' : '') +
      '<div class="selected-info">' +
        '<div class="selected-title">' + escHtml(track.trackName) + '</div>' +
        '<div class="selected-artist">' + escHtml(track.artistName) + '</div>' +
      '</div>' +
      '<button class="selected-clear" id="clearSong" type="button">✕</button>' +
    '</div>';
  selectedDiv.style.display = 'block';
  document.getElementById('clearSong').addEventListener('click', clearTrack);
}

function clearTrack() {
  selectedTrack = null;
  hiddenSong.value = '';
  searchInput.value = '';
  searchInput.style.display = 'block';
  selectedDiv.style.display = 'none';
  selectedDiv.innerHTML = '';
  searchInput.focus();
}

async function saveRequest(req) {
  try {
    const getRes = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const getData = await getRes.json();
    const existing = getData.record || [];
    existing.unshift(req);
    const putRes = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(existing.slice(0, 100))
    });
    return putRes.ok;
  } catch(e) { return false; }
}

document.getElementById('requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const song = hiddenSong.value.trim();
  if (!song) { searchInput.focus(); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Versturen…';
  const req = {
    id: Date.now(),
    song,
    artwork: selectedTrack ? (selectedTrack.artworkUrl100 || '') : '',
    name: document.getElementById('name').value.trim() || 'Anoniem',
    message: document.getElementById('message').value.trim(),
    time: new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' }),
    status: 'nieuw'
  };
  const ok = await saveRequest(req);
  if (ok) {
    document.getElementById('requestForm').style.display = 'none';
    document.getElementById('successScreen').style.display = 'flex';
  } else {
    document.getElementById('errorMsg').style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Verstuur verzoek 🎶';
  }
});

document.getElementById('anotherBtn').addEventListener('click', () => {
  clearTrack();
  document.getElementById('name').value = '';
  document.getElementById('message').value = '';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('requestForm').style.display = 'flex';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false;
  btn.textContent = 'Verstuur verzoek 🎶';
});

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
