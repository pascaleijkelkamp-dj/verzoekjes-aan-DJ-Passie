<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Passie — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #242424;
    --accent: #f0c040; --accent-dim: rgba(240,192,64,0.12);
    --green: #4cdc8c; --green-dim: rgba(76,220,140,0.12);
    --red: #e06060; --red-dim: rgba(220,80,80,0.12);
    --text: #f0ece4; --muted: #777; --border: rgba(255,255,255,0.08); --radius: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,13,0.97); z-index: 10; }
  .header-left h1 { font-size: 20px; font-weight: 700; }
  .live { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .stats { display: flex; gap: 12px; align-items: center; }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 2px; }
  .divider { width: 1px; height: 32px; background: var(--border); }
  .tabs { display: flex; padding: 12px 20px 0; gap: 4px; border-bottom: 1px solid var(--border); }
  .tab { font-size: 13px; font-weight: 600; padding: 8px 16px 10px; border-radius: 8px 8px 0 0; cursor: pointer; color: var(--muted); border: none; background: none; font-family: inherit; position: relative; }
  .tab.active { color: var(--text); }
  .tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent); border-radius:99px; }
  .count { background: var(--accent-dim); color: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 99px; margin-left: 4px; }
  main { padding: 16px 20px; max-width: 600px; margin: 0 auto; }
  .empty { text-align: center; padding: 60px 0; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .card.is-new { border-color: rgba(240,192,64,0.4); background: var(--surface2); animation: slideIn .25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .song { font-size: 16px; font-weight: 700; line-height: 1.3; flex: 1; }
  .time { font-size: 11px; color: var(--muted); white-space: nowrap; padding-top: 2px; }
  .by { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .by strong { color: var(--accent); font-weight: 600; }
  .note { font-size: 13px; background: var(--surface2); border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; line-height: 1.5; border-left: 2px solid rgba(240,192,64,0.3); }
  .pill { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; padding: 3px 8px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .pill.speelt { background: var(--green-dim); color: var(--green); }
  .pill.gespeeld { background: rgba(255,255,255,0.06); color: var(--muted); }
  .pill.overgeslagen { background: var(--red-dim); color: var(--red); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-family: inherit; }
  .btn.play { background: var(--green-dim); color: var(--green); border-color: rgba(76,220,140,0.25); }
  .btn.skip { background: var(--red-dim); color: var(--red); border-color: rgba(220,80,80,0.2); }
  .clear-btn { display: block; width: 100%; margin-top: 16px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 600; padding: 12px; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🎧 DJ Passie</h1>
    <div class="live"><div class="dot"></div>Live</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="statNew">0</div><div class="stat-label">Nieuw</div></div>
    <div class="divider"></div>
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Totaal</div></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="nieuw">Nieuw <span class="count" id="newCount">0</span></button>
  <button class="tab" data-tab="alle">Alle</button>
  <button class="tab" data-tab="gespeeld">Gespeeld</button>
</div>

<main>
  <div id="list"></div>
  <div id="empty" class="empty" style="display:none"><div class="icon">🎵</div><p>Geen verzoeken.</p></div>
  <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearAll()">Alles wissen</button>
</main>

<script>
var BIN_ID = '6a3fc556da38895dfe07495f';
var API_KEY = ['$2a','$10','$HSvUEG7Tte2c3RiQCZi1XOctWbQheMAIwQqt.EewSIyP6xB5zmGJi'].join('');
var allReqs = [];
var tab = 'nieuw';
var isFirst = true;

function esc(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getList(){
  if(tab==='nieuw') return allReqs.filter(function(r){return r.status==='nieuw';});
  if(tab==='gespeeld') return allReqs.filter(function(r){return r.status==='gespeeld'||r.status==='overgeslagen';});
  return allReqs;
}

function render(){
  var list = getList();
  var newCount = allReqs.filter(function(r){return r.status==='nieuw';}).length;
  document.getElementById('statNew').textContent = newCount;
  document.getElementById('statTotal').textContent = allReqs.length;
  document.getElementById('newCount').textContent = newCount;
  document.getElementById('clearBtn').style.display = allReqs.length > 0 ? 'block' : 'none';
  document.getElementById('empty').style.display = list.length === 0 ? 'block' : 'none';

  var html = '';
  list.forEach(function(r){
    var pill = '';
    if(r.status==='speelt') pill = '<span class="pill speelt">Speelt nu</span>';
    else if(r.status==='gespeeld') pill = '<span class="pill gespeeld">Gespeeld</span>';
    else if(r.status==='overgeslagen') pill = '<span class="pill overgeslagen">Overgeslagen</span>';
    html += '<div class="card" data-id="'+r.id+'">';
    html += '<div class="card-top"><div class="song">'+esc(r.song)+pill+'</div><div class="time">'+esc(r.time)+'</div></div>';
    html += '<div class="by">Door <strong>'+esc(r.name)+'</strong></div>';
    if(r.message) html += '<div class="note">"'+esc(r.message)+'"</div>';
    html += '<div class="actions">';
    html += '<button class="btn play" onclick="setStatus('+r.id+',\'speelt\')">▶ Speel nu</button>';
    html += '<button class="btn" onclick="setStatus('+r.id+',\'gespeeld\')">✓ Gespeeld</button>';
    html += '<button class="btn skip" onclick="setStatus('+r.id+',\'overgeslagen\')">✕ Sla over</button>';
    html += '</div></div>';
  });
  document.getElementById('list').innerHTML = html;
}

async function setStatus(id, status){
  allReqs.forEach(function(r){ if(r.id===id) r.status=status; });
  render();
  await save();
}

async function clearAll(){
  if(!confirm('Alles wissen?')) return;
  allReqs = [];
  await save();
  render();
}

async function load(){
  try{
    var r = await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
    var d = await r.json();
    var fresh = Array.isArray(d.record) ? d.record : [];
    var changed = JSON.stringify(fresh) !== JSON.stringify(allReqs);
    allReqs = fresh;
    if(changed || isFirst){ render(); isFirst=false; }
  }catch(e){}
}

async function save(){
  try{
    await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(allReqs)
    });
  }catch(e){}
}

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    tab = t.dataset.tab;
    render();
  });
});

load();
setInterval(load, 4000);
</script>
</body>
</html>
